# Track-A tier comparison on the identical LEVIR-CD test split via the identical harness (PRD §8).
# Headline artifact: baseline (ImageNet-free) vs strong (ImageNet MiT) vs FM (DINOv2 + LoRA).
#   python -m src.compare --manifest configs/compare_levircd.yaml
title: "LEVIR-CD — Track A model comparison"
split: test
select_split: val
out_dir: ${WORK}/sat-change-detection/results/comparison

models:
  - name: "FC-Siam-diff (baseline)"
    config: configs/levircd_baseline.yaml
  - name: "Siamese-SegFormer / MiT-b2 (diff)"
    config: configs/levircd_segformer.yaml
  - name: "Siamese-SegFormer / MiT-b2 (concat)"
    config: configs/levircd_segformer.yaml
    set: ["run_id=levircd_segformer_concat", "model.fusion=concat"]
  - name: "DINOv2-base + LoRA (diff) — FM tier"
    config: configs/levircd_dinov2.yaml
