name: CI

on:
  push:
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Install tools + light deps directly (no editable package install) so ruff/mypy see the
      # source tree exactly as local dev does. pytest imports src via pythonpath (pyproject).
      - name: Install tools + deps
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.15.20" "mypy>=1.11" "pytest>=8.0" "types-PyYAML>=6.0" "pyyaml>=6.0"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy (typed src/)
        run: mypy
      - name: Install torch (CPU) for model/loss/metric tests
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Pytest (CPU — includes model + loss tests)
        run: pytest -q
