name: CI

on:
  push:
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      # mypy runs BEFORE torch is installed so torch.* stays "ignore_missing_imports"
      # (matches local dev, where the ML stack lives on the cluster, not the dev box).
      - name: Mypy (typed src/)
        run: mypy
      - name: Install torch (CPU) for model/loss/metric tests
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Pytest (CPU — includes model + loss tests)
        run: pytest -q
